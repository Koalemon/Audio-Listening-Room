<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音频试听室</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #e8c87a;
      --accent2:   #c47a4a;
      --text:      #e8e2d6;
      --muted:     #666;
      --radius:    6px;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'Noto Serif SC', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── noise texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    /* ── header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 40px 24px;
      display: flex;
      align-items: baseline;
      gap: 20px;
      position: sticky; top: 0;
      background: rgba(13,13,13,.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      font-family: var(--font-mono);
      font-size: .65rem;
      color: var(--accent);
      letter-spacing: .2em;
      text-transform: uppercase;
      opacity: .7;
    }
    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: .03em;
      color: var(--text);
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #search {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: .75rem;
      padding: 7px 14px;
      border-radius: var(--radius);
      width: 200px;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    #track-count {
      font-family: var(--font-mono);
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .05em;
    }

    /* ── layout ── */
    .container {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      min-height: calc(100vh - 81px);
    }

    /* ── track list ── */
    #track-list {
      border-right: 1px solid var(--border);
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
      align-content: start;
    }

    .track-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, transform .1s, background .15s;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .track-card::after {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform .2s;
    }
    .track-card:hover { border-color: #444; background: #1c1c1c; }
    .track-card:hover::after { transform: scaleY(1); }
    .track-card.active {
      border-color: var(--accent);
      background: #1e1b10;
    }
    .track-card.active::after { transform: scaleY(1); }

    .track-icon {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .2s;
      font-size: 1rem;
    }
    .track-card.active .track-icon,
    .track-card:hover .track-icon {
      background: var(--accent);
    }

    .track-info { min-width: 0; }
    .track-name {
      font-size: .88rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .track-meta {
      font-family: var(--font-mono);
      font-size: .62rem;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: .04em;
    }

    /* playing wave bars */
    .wave-bars {
      display: none;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .track-card.active.playing .wave-bars { display: flex; }
    .wave-bars span {
      display: block; width: 3px;
      background: var(--accent);
      border-radius: 2px;
      animation: wave 1.2s ease-in-out infinite;
    }
    .wave-bars span:nth-child(1) { height: 6px;  animation-delay: 0s; }
    .wave-bars span:nth-child(2) { height: 12px; animation-delay: .2s; }
    .wave-bars span:nth-child(3) { height: 8px;  animation-delay: .4s; }
    .wave-bars span:nth-child(4) { height: 14px; animation-delay: .1s; }
    @keyframes wave {
      0%,100% { transform: scaleY(.4); }
      50%      { transform: scaleY(1); }
    }

    /* ── player sidebar ── */
    #player-panel {
      padding: 32px 28px;
      position: sticky;
      top: 81px;
      height: calc(100vh - 81px);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .player-art {
      width: 100%;
      aspect-ratio: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      position: relative;
      overflow: hidden;
    }
    .player-art::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(232,200,122,.06), transparent 70%);
    }
    .player-art .vinyl {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: repeating-conic-gradient(#1a1a1a 0deg, #222 10deg, #1a1a1a 20deg);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0s;
    }
    .player-art .vinyl.spinning {
      animation: spin 4s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .player-art .vinyl-center {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--accent);
    }

    .player-info { text-align: center; }
    .player-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
      word-break: break-all;
    }
    .player-sub {
      font-family: var(--font-mono);
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .08em;
    }

    /* progress */
    .progress-wrap {
      display: flex; flex-direction: column; gap: 6px;
    }
    #progress-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform .1s;
    }
    #progress-bar:hover::-webkit-slider-thumb { transform: scale(1.3); }
    .time-row {
      display: flex; justify-content: space-between;
      font-family: var(--font-mono);
      font-size: .62rem;
      color: var(--muted);
    }

    /* controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, transform .1s;
      padding: 4px;
    }
    .ctrl-btn:hover { color: var(--text); transform: scale(1.15); }
    #play-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: none;
      color: var(--accent);
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    #play-btn:hover { background: rgba(232,200,122,.12); transform: scale(1.05); }

    /* volume */
    .volume-row {
      display: flex; align-items: center; gap: 10px;
    }
    .vol-icon { font-size: .9rem; color: var(--muted); }
    #volume-bar {
      flex: 1;
      -webkit-appearance: none; appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #volume-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* ── loading / error ── */
    #loading, #error-msg {
      grid-column: 1 / -1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 20px;
      gap: 14px;
      font-family: var(--font-mono);
      font-size: .8rem;
      color: var(--muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    /* ── empty state ── */
    #empty-state {
      display: none;
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: .75rem;
      letter-spacing: .06em;
    }

    /* ── config banner ── */
    #config-banner {
      background: #1a1208;
      border: 1px solid var(--accent2);
      border-radius: var(--radius);
      padding: 14px 20px;
      margin: 16px;
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--accent);
      line-height: 1.7;
    }
    #config-banner strong { color: #f0d080; }
    #config-banner code {
      background: rgba(255,255,255,.06);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: .68rem;
    }

    /* ── mobile ── */
    @media (max-width: 760px) {
      header { padding: 16px 16px 14px; gap: 10px; flex-wrap: wrap; }
      header h1 { font-size: 1.1rem; }
      #search { width: 140px; }
      .header-right { gap: 8px; }

      .container {
        grid-template-columns: 1fr;
      }

      #track-list {
        border-right: none;
        border-bottom: 1px solid var(--border);
        grid-template-columns: 1fr;
        padding: 12px;
        gap: 8px;
      }

      #player-panel {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        top: auto;
        height: auto;
        background: rgba(13,13,13,.97);
        backdrop-filter: blur(16px);
        border-top: 1px solid var(--border);
        padding: 14px 20px 20px;
        flex-direction: row;
        align-items: center;
        gap: 14px;
        z-index: 200;
        transition: transform .3s;
      }
      #player-panel.hidden { transform: translateY(110%); }

      .player-art { display: none; }

      .player-info { text-align: left; flex: 1; min-width: 0; }
      .player-title { font-size: .85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      .controls { gap: 12px; }
      #play-btn { width: 42px; height: 42px; font-size: 1.1rem; }

      .progress-wrap, .volume-row { display: none; }

      /* mobile progress strip at very bottom */
      #mobile-progress {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 2px;
        background: var(--border);
        z-index: 300;
      }
      #mobile-progress-fill {
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: width .4s linear;
      }

      body { padding-bottom: 80px; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">▶ AUDIO</span>
  <h1>试听室</h1>
  <div class="header-right">
    <span id="track-count" style="display:none"></span>
    <input id="search" type="search" placeholder="搜索音频…" autocomplete="off" />
  </div>
</header>

<!-- Config banner shown when repo not set -->
<div id="config-banner" style="display:none">
  ⚠ 请在此页面 <strong>顶部</strong> 配置你的仓库信息：<br/>
  将 <code>GITHUB_USER</code> 改为你的 GitHub 用户名，<code>GITHUB_REPO</code> 改为仓库名，<code>AUDIO_FOLDER</code> 改为存放音频的文件夹路径（根目录留空 <code>""</code>）。
</div>

<div class="container">
  <div id="track-list">
    <div id="loading"><div class="spinner"></div><span>正在加载音频列表…</span></div>
    <div id="error-msg" style="display:none">⚠ 加载失败，请检查仓库配置或网络</div>
    <div id="empty-state">暂无音频文件</div>
  </div>

  <aside id="player-panel" class="hidden">
    <div class="player-art">
      <div class="vinyl" id="vinyl"><div class="vinyl-center"></div></div>
    </div>
    <div class="player-info">
      <div class="player-title" id="player-title">选择一首音频</div>
      <div class="player-sub" id="player-sub">——</div>
    </div>
    <div class="progress-wrap">
      <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1" />
      <div class="time-row">
        <span id="time-cur">0:00</span>
        <span id="time-dur">0:00</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="prev-btn" title="上一首">⏮</button>
      <button id="play-btn" title="播放/暂停">▶</button>
      <button class="ctrl-btn" id="next-btn" title="下一首">⏭</button>
    </div>
    <div class="volume-row">
      <span class="vol-icon">🔈</span>
      <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="0.8" />
    </div>
  </aside>
</div>

<div id="mobile-progress"><div id="mobile-progress-fill"></div></div>

<audio id="audio-el"></audio>

<script>
// ╔══════════════════════════════════════════════╗
// ║         ⬇  修改这里的配置  ⬇                ║
// ╠══════════════════════════════════════════════╣
const GITHUB_USER   = "YOUR_USERNAME";   // GitHub 用户名
const GITHUB_REPO   = "YOUR_REPO";       // 仓库名
const AUDIO_FOLDER  = "audio";           // 音频文件夹，根目录填 ""
// ╚══════════════════════════════════════════════╝

const AUDIO_EXTS = ['.mp3','.wav','.ogg','.flac','.aac','.m4a','.opus','.weba'];

// ── state ──
let tracks = [];
let filtered = [];
let currentIdx = -1;
let isPlaying = false;

// ── DOM refs ──
const audio       = document.getElementById('audio-el');
const trackList   = document.getElementById('track-list');
const loadingEl   = document.getElementById('loading');
const errorEl     = document.getElementById('error-msg');
const emptyEl     = document.getElementById('empty-state');
const playerPanel = document.getElementById('player-panel');
const vinyl       = document.getElementById('vinyl');
const playerTitle = document.getElementById('player-title');
const playerSub   = document.getElementById('player-sub');
const playBtn     = document.getElementById('play-btn');
const prevBtn     = document.getElementById('prev-btn');
const nextBtn     = document.getElementById('next-btn');
const progressBar = document.getElementById('progress-bar');
const volBar      = document.getElementById('volume-bar');
const timeCur     = document.getElementById('time-cur');
const timeDur     = document.getElementById('time-dur');
const searchEl    = document.getElementById('search');
const countEl     = document.getElementById('track-count');
const configBanner= document.getElementById('config-banner');
const mobileProgressFill = document.getElementById('mobile-progress-fill');

// ── fetch track list from GitHub API ──
async function loadTracks() {
  if (GITHUB_USER === 'YOUR_USERNAME' || GITHUB_REPO === 'YOUR_REPO') {
    configBanner.style.display = 'block';
    loadingEl.style.display = 'none';
    return;
  }

  const path = AUDIO_FOLDER ? `contents/${AUDIO_FOLDER}` : 'contents';
  const url  = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/${path}`;

  try {
    const res  = await fetch(url, { headers: { Accept: 'application/vnd.github.v3+json' } });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    tracks = data
      .filter(f => f.type === 'file' && AUDIO_EXTS.some(e => f.name.toLowerCase().endsWith(e)))
      .map(f => ({
        name: f.name.replace(/\.[^.]+$/, ''),
        ext:  f.name.split('.').pop().toUpperCase(),
        size: formatBytes(f.size),
        url:  f.download_url,
        raw:  f.name,
      }));

    loadingEl.style.display = 'none';

    if (tracks.length === 0) {
      emptyEl.style.display = 'block';
      return;
    }

    countEl.textContent = `${tracks.length} 首`;
    countEl.style.display = 'inline';

    filtered = [...tracks];
    renderTracks();
  } catch (e) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'flex';
    console.error(e);
  }
}

// ── render ──
function renderTracks() {
  // remove old cards
  document.querySelectorAll('.track-card').forEach(c => c.remove());
  emptyEl.style.display = filtered.length === 0 ? 'block' : 'none';

  filtered.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'track-card' + (i === currentIdx ? ' active' : '') + (i === currentIdx && isPlaying ? ' playing' : '');
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="track-icon">${getIcon(t.ext)}</div>
      <div class="track-info">
        <div class="track-name">${escHtml(t.name)}</div>
        <div class="track-meta">${t.ext} · ${t.size}</div>
      </div>
      <div class="wave-bars"><span></span><span></span><span></span><span></span></div>
    `;
    card.addEventListener('click', () => playTrack(i));
    trackList.appendChild(card);
  });
}

// ── play ──
function playTrack(idx) {
  if (idx < 0 || idx >= filtered.length) return;
  currentIdx = idx;
  const t = filtered[idx];

  audio.src = t.url;
  audio.volume = parseFloat(volBar.value);
  audio.play();
  isPlaying = true;

  playerTitle.textContent = t.name;
  playerSub.textContent   = `${t.ext} · ${t.size}`;
  playerPanel.classList.remove('hidden');
  vinyl.classList.add('spinning');
  playBtn.textContent = '⏸';

  document.querySelectorAll('.track-card').forEach((c, i) => {
    c.classList.toggle('active',  i === idx);
    c.classList.toggle('playing', i === idx);
  });
}

function togglePlay() {
  if (currentIdx === -1) return;
  if (audio.paused) {
    audio.play();
    isPlaying = true;
    playBtn.textContent = '⏸';
    vinyl.classList.add('spinning');
    document.querySelectorAll('.track-card.active').forEach(c => c.classList.add('playing'));
  } else {
    audio.pause();
    isPlaying = false;
    playBtn.textContent = '▶';
    vinyl.classList.remove('spinning');
    document.querySelectorAll('.track-card.active').forEach(c => c.classList.remove('playing'));
  }
}

prevBtn.addEventListener('click', () => {
  if (currentIdx > 0) playTrack(currentIdx - 1);
});
nextBtn.addEventListener('click', () => {
  if (currentIdx < filtered.length - 1) playTrack(currentIdx + 1);
});
playBtn.addEventListener('click', togglePlay);

audio.addEventListener('ended', () => {
  if (currentIdx < filtered.length - 1) {
    playTrack(currentIdx + 1);
  } else {
    isPlaying = false;
    playBtn.textContent = '▶';
    vinyl.classList.remove('spinning');
  }
});

// ── progress ──
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressBar.value = pct;
  mobileProgressFill.style.width = pct + '%';
  timeCur.textContent = fmtTime(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  timeDur.textContent = fmtTime(audio.duration);
  progressBar.value = 0;
});
progressBar.addEventListener('input', () => {
  if (audio.duration) audio.currentTime = (progressBar.value / 100) * audio.duration;
});
volBar.addEventListener('input', () => { audio.volume = parseFloat(volBar.value); });

// ── search ──
searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  filtered = q ? tracks.filter(t => t.name.toLowerCase().includes(q) || t.raw.toLowerCase().includes(q)) : [...tracks];
  currentIdx = -1;
  renderTracks();
});

// ── utils ──
function fmtTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
function formatBytes(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function getIcon(ext) {
