<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐试听舱</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            /* 主紫色 */
            --primary-light: #ddd6fe;
            /* 浅紫 */
            --bg: #f8fafc;
            /* 背景白 */
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 24px;
            height: 85vh;
            margin-top: 20px;
        }

        .player-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 20px;
        }

        .cover-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 25px;
        }

        .film-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 10;
            pointer-events: none;
        }

        .rotate-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
        }

        .playing .rotate-wrapper {
            animation: rotateCover 20s linear infinite;
        }

        .cover-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 205px;
            height: 205px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--primary-light);
        }

        #coverImg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes rotateCover {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .info {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .info h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #visualizer {
            width: 100% !important;
            height: 60px;
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        .list-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bg);
        }

        .search-box {
            padding: 8px 15px;
            border: 1.5px solid var(--primary-light);
            border-radius: 10px;
            outline: none;
            width: 200px;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            border-color: var(--primary);
        }

        .playlist {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .playlist::-webkit-scrollbar {
            width: 5px;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;
        }

        .audio-item {
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }

        .audio-item:hover {
            background: var(--bg);
        }

        .audio-item.active {
            background: #f5f3ff;
            border-color: var(--primary-light);
            color: var(--primary);
            font-weight: bold;
        }

        .audio-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .title-tip {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .title-tip h1 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .title-tip p {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin: 0;
        }

        @media (max-width: 850px) {
            .app-container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .player-card {
                position: relative;
                top: 0;
            }

            .list-card {
                height: 500px;
            }

            .cover-container {
                width: 280px;
                height: 280px;
            }

            .cover-wrapper {
                width: 220px;
                height: 220px;
            }
        }

        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* 禁止拖拽 */
        * {
            -webkit-user-drag: none;
        }
    </style>
</head>

<script>
    console.info("aa");
    (async () => {
        async function getHTMLHash(selector) {
            const el = document.querySelector(selector);
            if (!el) { console.error('找不到元素:', selector); return; }
            const html = el.innerHTML.trim();
            const buf = await crypto.subtle.digest(
                'SHA-256', new TextEncoder().encode(html)
            );
            return btoa(String.fromCharCode(...new Uint8Array(buf)));
        }

        const h1 = await getHTMLHash('.title-tip');
        const h2 = await getHTMLHash('.list-header');
        console.log('title-tip   :', h1);
        console.log('list-header :', h2);
    })();
    

    
</script>
